<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hors ligne — Moussa Business</title>
  <meta name="theme-color" content="#E8391A">
  <style>
    :root {
      --red: #E8391A
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Outfit', Helvetica, sans-serif;
      background: #0D0D0D;
      color: #F0F0F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px
    }

    h1 span {
      color: var(--red)
    }

    p {
      font-size: 15px;
      color: #AAA;
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 32px
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 14px;
      background: var(--red);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }

    .btn:hover {
      opacity: .85
    }

    .footer-note {
      margin-top: 48px;
      font-size: 12px;
      color: #555
    }
  </style>
</head>

<body>
  <div class="icon">📡</div>
  <h1>Vous êtes <span>hors ligne</span></h1>
  <p>Votre connexion internet est indisponible. Certaines pages sont accessibles depuis le cache.</p>
  <a class="btn" href="javascript:history.back()">← Retour</a>
  <a class="btn" style="background:#1A1A1A;border:1px solid #333;margin-top:12px" href="index.html">Accueil</a>
  <p class="footer-note">Moussa Business · PWA Mode</p>
</body>

</html>
